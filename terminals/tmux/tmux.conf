# =============================================================================
# Tmux Configuration
# =============================================================================

# Remap prefix from C-b to C-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable true color and 256 colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*:Tc"

# Enable mouse support
set -g mouse on

# Start windows and panes at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback
set -g history-limit 50000

# Faster escape time (for vim)
set -sg escape-time 0

# Focus events for vim/neovim
set -g focus-events on

# =============================================================================
# Key Bindings
# =============================================================================

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Switch windows with Shift+Arrow
bind -n S-Left  previous-window
bind -n S-Right next-window

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# =============================================================================
# Status Bar
# =============================================================================

set -g status-position top
set -g status-interval 5

# Colors
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e] "

# Right: host and time
set -g status-right-length 50
set -g status-right "#[fg=#585b70] %H:%M #[fg=#89b4fa]#[fg=#1e1e2e,bg=#89b4fa,bold] #h "

# Window tabs
set -g window-status-format "#[fg=#585b70] #I:#W "
set -g window-status-current-format "#[fg=#cdd6f4,bg=#313244,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Message style
set -g message-style "bg=#313244,fg=#cdd6f4"
