# Starship Prompt Configuration
# Docs: https://starship.rs/config/

# Timeout for commands (ms)
command_timeout = 1000

# Newline between prompts
add_newline = true

# Prompt format
format = """
$directory\
$git_branch\
$git_status\
$git_state\
$scala\
$java\
$nodejs\
$python\
$golang\
$rust\
$zig\
$docker_context\
$kubernetes\
$terraform\
$nix_shell\
$aws\
$cmd_duration\
$line_break\
$character"""

# Right prompt
right_format = """$time"""

# =============================================================================
# Prompt character
# =============================================================================
[character]
success_symbol = "[❯](mauve)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

# =============================================================================
# Directory
# =============================================================================
[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold blue"
read_only = " 󰌾"
home_symbol = "~"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"projects" = " "

# =============================================================================
# Git
# =============================================================================
[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "lavender"
truncation_length = 30

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "peach"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "=${count}"
deleted = "✘${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
stashed = "*${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "yellow"

# =============================================================================
# Languages
# =============================================================================
[scala]
format = "[$symbol($version )]($style)"
symbol = " "
style = "red"
detect_files = ["build.sbt", ".scalaenv", ".sbtenv", "build.sc"]
detect_extensions = ["scala", "sbt", "sc"]

[java]
format = "[$symbol($version )]($style)"
symbol = " "
style = "red"
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", ".java-version"]

[nodejs]
format = "[$symbol($version )]($style)"
symbol = " "
style = "green"
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
style = "yellow"
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", "Pipfile", ".python-version"]
detect_folders = [".venv", "venv"]

[golang]
format = "[$symbol($version )]($style)"
symbol = " "
style = "cyan"

[rust]
format = "[$symbol($version )]($style)"
symbol = "🦀 "
style = "peach"

[zig]
format = "[$symbol($version )]($style)"
symbol = " "
style = "yellow"

# =============================================================================
# Infrastructure
# =============================================================================
[docker_context]
format = "[$symbol$context]($style) "
symbol = " "
style = "blue"
only_with_files = true

[kubernetes]
format = "[$symbol$context( \\($namespace\\))]($style) "
symbol = "⎈ "
style = "cyan"
disabled = false
detect_files = ["k8s", "kubernetes"]
detect_folders = ["k8s", "kubernetes"]

[terraform]
format = "[$symbol$workspace]($style) "
symbol = "󱁢 "
style = "purple"

[nix_shell]
format = "[$symbol$state( \\($name\\))]($style) "
symbol = " "
style = "blue"

[aws]
disabled = true
# AWS profile is always set globally — too noisy in prompt
# Check with: aws sts get-caller-identity

# =============================================================================
# Command duration
# =============================================================================
[cmd_duration]
min_time = 3_000
format = "[$duration]($style) "
style = "yellow"
show_milliseconds = false

# =============================================================================
# Time (right prompt)
# =============================================================================
[time]
disabled = false
format = "[$time]($style)"
style = "dimmed"
time_format = "%H:%M"

# =============================================================================
# Disabled modules (too noisy)
# =============================================================================
[package]
disabled = true

[line_break]
disabled = false
